    <!-- Theme script - runs before React -->
    <script>
      (function () {
        const saved = localStorage.getItem("theme");
        const isDark = saved
          ? saved === "dark"
          : window.matchMedia("(prefers-color-scheme: dark)").matches;

        if (isDark) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
